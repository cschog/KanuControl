# ==================================================
# Datasource
# ==================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/kanu?currentSchema=kanu
spring.datasource.username=kcuser
spring.datasource.password=kcpassword
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.connection-timeout=20000


# ==================================================
# JPA / Hibernate
# ==================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Multi-Tenancy aktiv
spring.jpa.properties.hibernate.multiTenancy=SCHEMA


# ==================================================
# Liquibase
# ==================================================
spring.liquibase.enabled=false


# ==================================================
# Test Tenants
# ==================================================
kcserver.test-tenants[0]=tenant_test_1
kcserver.test-tenants[1]=tenant_test_2
kcserver.test-tenants[2]=tenant_test_3


# ==================================================
# Security
# ==================================================
keycloak.enabled=false

# OAuth2 komplett deaktivieren
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration,org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientWebSecurityAutoConfiguration

# ==================================================
# Logging (ruhig halten)
# ==================================================
spring.mvc.log-resolved-exception=false

logging.level.root=ERROR
logging.level.com.kcserver=ERROR

logging.level.org.springframework=ERROR
logging.level.org.springframework.web=ERROR
logging.level.org.springframework.validation=ERROR
logging.level.org.springframework.security=ERROR

logging.level.org.springframework.web.servlet=ERROR
logging.level.org.springframework.web.servlet.mvc.method.annotation=ERROR

logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql=ERROR
logging.level.org.springframework.transaction=ERROR

logging.level.org.springframework.test.web.servlet=ERROR
logging.level.org.springframework.web.servlet.DispatcherServlet=ERROR
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=ERROR